name: Build APK + AAB on Pull Request to Prod

on:
  pull_request:
    branches: [prod]
    types: [opened, synchronize, reopened]

permissions:
  contents: write # allow creating/updating Releases & uploading assets
  actions: read # allow pulling marketplace actions
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true # ensure submodules are available

      - name: 🛠️ Setup Flutter
        id: setup
        uses: ./.github/actions/setup-flutter
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.KEY_PROPERTIES }}

      - name: 🏗️ Build signed APK
        run: flutter build apk --release

      - name: 📦 Rename APK files
        run: |
          VERSION="${{ steps.setup.outputs.version }}"
          SRC_DIR="build/app/outputs/apk/release"
          DEST_DIR="build/app/outputs/flutter-apk"

          mkdir -p "$DEST_DIR"

          # Rename and move universal APK
          if [ -f "$SRC_DIR/app-universal-release.apk" ]; then
            mv "$SRC_DIR/app-universal-release.apk" "$DEST_DIR/brokeflix-v${VERSION}-universal.apk"
            echo "Universal APK moved and renamed"
          elif [ -f "$DEST_DIR/app-release.apk" ]; then
            mv "$DEST_DIR/app-release.apk" "$DEST_DIR/brokeflix-v${VERSION}-universal.apk"
            echo "Universal APK (from flutter-apk) moved and renamed"
          fi

          # Rename and move arm64-v8a APK
          if [ -f "$SRC_DIR/app-arm64-v8a-release.apk" ]; then
            mv "$SRC_DIR/app-arm64-v8a-release.apk" "$DEST_DIR/brokeflix-v${VERSION}-arm64-v8a.apk"
            echo "arm64-v8a APK moved and renamed"
          fi

          # Rename and move armeabi-v7a APK
          if [ -f "$SRC_DIR/app-armeabi-v7a-release.apk" ]; then
            mv "$SRC_DIR/app-armeabi-v7a-release.apk" "$DEST_DIR/brokeflix-v${VERSION}-armeabi-v7a.apk"
            echo "armeabi-v7a APK moved and renamed"
          fi

          # List renamed files to verify
          ls -la "$DEST_DIR"

      - name: 📊 Get APK info
        id: apk_info
        run: |
          sudo apt-get update && sudo apt-get install -y bc
          VERSION="${{ steps.setup.outputs.version }}"
          DEST_DIR="build/app/outputs/flutter-apk"

          # Helper function to get size in MB
          get_size() {
            local file_path="$1"
            if [ -f "$file_path" ]; then
              local bytes=$(stat -c%s "$file_path")
              echo "scale=2; $bytes / 1024 / 1024" | bc
            else
              echo "N/A"
            fi
          }

          SIZE_UNIVERSAL=$(get_size "$DEST_DIR/brokeflix-v${VERSION}-universal.apk")
          SIZE_ARM64=$(get_size "$DEST_DIR/brokeflix-v${VERSION}-arm64-v8a.apk")
          SIZE_ARM32=$(get_size "$DEST_DIR/brokeflix-v${VERSION}-armeabi-v7a.apk")

          echo "size_universal=$SIZE_UNIVERSAL" >> $GITHUB_OUTPUT
          echo "size_arm64=$SIZE_ARM64" >> $GITHUB_OUTPUT
          echo "size_arm32=$SIZE_ARM32" >> $GITHUB_OUTPUT

          echo "Universal APK: $SIZE_UNIVERSAL MB"
          echo "ARM64-v8a APK: $SIZE_ARM64 MB"
          echo "ARMeabi-v7a APK: $SIZE_ARM32 MB"

      - name: 🚀 Create Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.setup.outputs.tag }}
          name: "Brokeflix v${{ steps.setup.outputs.version }} - PR #${{ github.event.pull_request.number }}"
          body: |
            🚀 **Brokeflix APK Build from Pull Request #${{ github.event.pull_request.number }}**

            **📱 App Details:**
            - Version: ${{ steps.setup.outputs.version }}
            - Build Type: Release APK (Architectures Split)
            - Flutter Version: 3.32.1

            **📥 Downloads & Sizes:**
            - 🌍 **Universal APK**: `${{ steps.apk_info.outputs.size_universal }} MB` (for all devices)
            - ⚡ **ARM64-v8a APK**: `${{ steps.apk_info.outputs.size_arm64 }} MB` (for modern 64-bit devices)
            - 🔋 **ARMeabi-v7a APK**: `${{ steps.apk_info.outputs.size_arm32 }} MB` (for older/budget 32-bit devices)

            **🔐 Signing:**
            ${{ secrets.KEYSTORE_BASE64 && '✅ Signed with release keystore' || '⚠️ Signed with debug keystore' }}

            **📋 Build Info:**
            - Commit: ${{ github.sha }}
            - PR: #${{ github.event.pull_request.number }}
            - Branch: ${{ github.head_ref }}
            - Triggered by: @${{ github.actor }}

            **📥 Installation:**
            Download the APK appropriate for your device's architecture (typically **ARM64-v8a** for modern phones). If you are unsure, download the **Universal** version. Install it on your device (make sure to enable "Install from unknown sources" if prompted).

            ---
            *This is a preview build from a pull request. For production releases, check the main releases page.*
          draft: false
          prerelease: true
          files: |
            build/app/outputs/flutter-apk/brokeflix-v${{ steps.setup.outputs.version }}-*.apk
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 💬 Comment PR with Release Link
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v9
        with:
          script: |
            const version = '${{ steps.setup.outputs.version }}';
            const sizeUniversal = '${{ steps.apk_info.outputs.size_universal }}';
            const sizeArm64 = '${{ steps.apk_info.outputs.size_arm64 }}';
            const sizeArm32 = '${{ steps.apk_info.outputs.size_arm32 }}';
            const tag = '${{ steps.setup.outputs.tag }}';
            const releaseUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/${tag}`;

            const keystoreUsed = '${{ secrets.KEYSTORE_BASE64 }}'
              ? '🔐 Signed with release keystore'
              : '⚠️ Signed with debug keystore';

            const comment = `🚀 **APK Build Successful - Release Created!**

            📱 **Download Release:** [${tag} Release Output](${releaseUrl})

            **📊 APK Sizes:**
            * 🌍 **Universal APK:** ${sizeUniversal} MB
            * ⚡ **ARM64-v8a APK:** ${sizeArm64} MB
            * 🔋 **ARMeabi-v7a APK:** ${sizeArm32} MB

            ${keystoreUsed}

            **Build Details:**
            - Version: ${version}
            - Commit: ${context.sha.substring(0, 7)}
            - Flutter Version: 3.32.1
            - Build Type: Release APKs

            **📥 How to install:**
            1. Click the release link above.
            2. Choose the APK for your phone's architecture (usually **ARM64-v8a**). If you are unsure, download the **Universal** version.
            3. Install on your Android device (enable "Unknown sources" if needed).

            *This is a preview release created from PR #${context.payload.pull_request.number}*`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment,
            });

  build-aab:
    name: Build AAB
    runs-on: ubuntu-latest
    # Serialized after build-apk to avoid racing on the same Release tag.
    # Build itself reruns setup-flutter (cache hit) — minimal overhead.
    # Future store-publish workflows will read this AAB from the Release.
    needs: build-apk

    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true # ensure submodules are available

      - name: 🛠️ Setup Flutter
        id: setup
        uses: ./.github/actions/setup-flutter
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.KEY_PROPERTIES }}

      - name: 🏗️ Build signed AAB
        run: flutter build appbundle --release

      - name: 📦 Rename AAB file
        run: |
          AAB_PATH="build/app/outputs/bundle/release/app-release.aab"
          if [ -f "$AAB_PATH" ]; then
            mv "$AAB_PATH" "build/app/outputs/bundle/release/brokeflix-v${{ steps.setup.outputs.version }}.aab"
            echo "AAB renamed to brokeflix-v${{ steps.setup.outputs.version }}.aab"
          else
            echo "AAB file not found, failing"
            exit 1
          fi

      - name: 📊 Get AAB info
        id: aab_info
        run: |
          sudo apt-get update && sudo apt-get install -y bc

          AAB_PATH="build/app/outputs/bundle/release/brokeflix-v${{ steps.setup.outputs.version }}.aab"
          SIZE_BYTES=$(stat -c%s "$AAB_PATH")
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1024 / 1024" | bc)
          echo "size_mb=$SIZE_MB" >> $GITHUB_OUTPUT
          echo "AAB size: ${SIZE_MB} MB"

      - name: 🚀 Upload AAB to existing Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.setup.outputs.tag }}
          # Release already created by build-apk; this appends the AAB asset.
          append_body: false
          draft: false
          prerelease: true
          files: |
            build/app/outputs/bundle/release/brokeflix-v${{ steps.setup.outputs.version }}.aab
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 💬 Comment PR with AAB info
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v9
        with:
          script: |
            const version = '${{ steps.setup.outputs.version }}';
            const size = '${{ steps.aab_info.outputs.size_mb }}';
            const tag = '${{ steps.setup.outputs.tag }}';
            const releaseUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/${tag}`;

            const keystoreUsed = '${{ secrets.KEYSTORE_BASE64 }}'
              ? '🔐 Signed with release keystore'
              : '⚠️ Signed with debug keystore';

            const comment = `📦 **AAB Build Successful — Attached to Release!**

            📱 **Download AAB:** [${tag} Release](${releaseUrl})
            📊 **Size:** ${size} MB
            ${keystoreUsed}

            **Build Details:**
            - Version: ${version}
            - Commit: ${context.sha.substring(0, 7)}
            - Flutter Version: 3.32.1
            - Build Type: Release AAB (Android App Bundle)

            **🏪 Store upload:**
            This AAB is the format required by Google Play, Samsung Galaxy Store and Huawei AppGallery. Future workflows will auto-publish via each store's API.

            *Attached to release from PR #${context.payload.pull_request.number}*`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment,
            });
